<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric-Visions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/t-electric-logo-combination-with-lightning-thunder-bolt-favicon.avif" type="image/x-icon">
</head>
<body>
    
    <header>

        <div class="navbar-container"> 
            
            <nav class="navbar">

                <!-- Logo -->
                <div class="logo">
                    <a href="#">
                        <img src="./assets/lightning-bolt-black-shape.svg" alt="Electric Logo" style="width: 40px; height: auto; object-fit: contain; display: block;">
                    </a>
                </div>

                <!-- Main Menu -->
                <div class="middle-menu">
                    <span class="nav-item">Vehicles</span>
                    <span class="nav-item">Energy</span>
                    <span class="nav-item">Charging</span>
                    <span class="nav-item">Discover</span>
                    <span class="nav-item">Shop</span>
                </div>
                <!-- Secondary Menu -->
                <div class="right-menu">
                    <span class="nav-item">Support</span>
                    <span class="nav-item">Region Language</span>
                    <span class="nav-item">Account</span>
                </div>


            </nav>

        </div>
        
    </header>

    <main>

        <section class="hero-section">

            <!-- Slides -->
            <div class="slide" id="slide-1">
                <h1>Full Self-Driving (Supervised)</h1>
                <p>Available From $99/mo</p>
                <a href="#slide-3" class="arrow arrow left">&#8249;</a> 
                <a href="#slide-2" class="arrow arrow right">&#8250;</a>
            </div>

            <div class="actions-area">
                <button class="dark-btn">Demo FSD (Supervised)</button>
                <button class="light-btn">Learn More</button>
            </div>

            <div class="slide" id="slide-2">
                <h1>Model 3</h1>
                <p><a href="https://www.tesla.com/model3/design?cfg=%24MT367&id=finplat.AUTO_LEASE%3AOPERATIONAL_LEASE%3ACT_PRIVATE#overview">Lease From $299/mo</a></p>
                <a href="#slide-1" class="arrow arrow left">&#8249;</a> 
                <a href="#slide-3" class="arrow arrow right">&#8250;</a>
            </div>

            <div class="actions-area">
                <button class="dark-btn">Order Now</button>
                <button class="light-btn">View Inventory</button>
            </div>

            <div class="slide" id="slide-3">
                <h1>Model Y</h1>
                <p><a href="https://www.tesla.com/modely/design?id=finplat.AUTO_LOAN%3ALOAN%3ACT_PRIVATE">0% APR Available</a></p>
                <a href="#slide-2" class="arrow arrow left">&#8249;</a> 
                <a href="#slide-1" class="arrow arrow right">&#8250;</a>
            </div>

            <div class="actions-area">
                <button class="dark-btn">Order Now</button>
                <button class="light-btn">View Inventory</button>
            </div>

            

        </section>




    </main>

</body>
</html>
